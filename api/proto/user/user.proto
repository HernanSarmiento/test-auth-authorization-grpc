syntax = "proto3";
package user;
option go_package = "github.com/HernanSarmiento/test-auth-authorization-grpc/api/proto/user;user";

import "google/protobuf/field_mask.proto";


service UserService{
    rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser (GetUserRequest) returns (UserCredentialsResponse);
    rpc UpdateUser (UpdateUserRequest) returns (UpdateUserResponse);
    rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
}

message User{
    string user_id = 1;
    string username = 2;
    string email = 3;
    string role = 4;
}

message CreateUserRequest{
    string username = 1;
    string email = 2;
    string password = 3;
}

message CreateUserResponse{
    User user = 1;
    string message = 2;
}

message GetUserRequest{
    string email = 1;
}

message UserCredentialsResponse{
    string user_id = 1;
    string email = 2;
    string role = 3;
    string author_name = 4;
    string hash_password = 5;
}

message GetUserResponse{
    User user = 1;
}

message UpdateUserRequest{
    string user_id = 1;
    User user = 2;
    google.protobuf.FieldMask field_mask = 3;
}

message UpdateUserResponse{
    string message = 1;
}

message DeleteUserRequest{
    string user_id = 1;
}

message DeleteUserResponse{
    string user_id = 1;
    string message = 2;
}