syntax = "proto3";
package blog;
option go_package = "github.com/HernanSarmiento/test-auth-authorization-grpc/api/proto/blog;blog";

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

service BlogService{
    rpc CreatePost (CreatePostRequest) returns (CreatePostResponse);
    rpc GetPost (GetPostRequest) returns (GetPostResponse);
    rpc GetAllPost (GetAllPostRequest) returns (GetAllPostResponse);
    rpc UpdatePost (UpdatePostRequest) returns (UpdatePostResponse);
    rpc DeletePost (DeletePostRequest) returns (DeletePostResponse);
}

message Post{
    string postId = 1;
    string title = 2;
    string body = 3;
    google.protobuf.Timestamp created_at = 4;
}

message CreatePostRequest{
    string title = 1;
    string body = 2;
    string created_at = 3;
}

message CreatePostResponse{
    Post post = 1;
}

message GetPostRequest{
    string postId = 1;
}

message GetPostResponse{
    Post post = 1;
}
message GetAllPostRequest{
    int32 page_number = 1;
    int32 result_per_page = 2;
}

message GetAllPostResponse{
    repeated Post post = 1;
}

message UpdatePostRequest{
    string postId = 1;
    Post post = 2;
    google.protobuf.FieldMask updateMask = 3;
}

message UpdatePostResponse{
    Post post = 1;
    string message = 2;
}

message DeletePostRequest{
    string postId = 1;
}

message DeletePostResponse{
    string postId = 1;
    string message = 2;
}

